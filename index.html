<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Random Site</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        header {
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
        }

        .container {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.2);
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 10px;
            background: #ff7eb3;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff4f9a;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    🚀 Мой случайный сайт
</header>

<div class="container">
    <div class="card">
        <h2>Карточка 1</h2>
        <p>Какой-то рандомный текст для примера дизайна.</p>
        <button onclick="alert('Ты нажал кнопку!')">Нажми</button>
    </div>

    <div class="card">
        <h2>Карточка 2</h2>
        <p>Еще немного текста, чтобы выглядело красиво.</p>
        <button onclick="changeColor()">Сменить фон</button>
    </div>

    <div class="card">
        <h2>Карточка 3</h2>
        <p>Минималистичный и быстрый дизайн.</p>
        <button onclick="showTime()">Показать время</button>
    </div>
</div>

<footer>
    © 2026 Random Site
</footer>

<script>
    function changeColor() {
        document.body.style.background = 
            "linear-gradient(135deg, #" + Math.floor(Math.random()*16777215).toString(16) +
            ", #" + Math.floor(Math.random()*16777215).toString(16) + ")";
    }

    function showTime() {
        alert("Текущее время: " + new Date().toLocaleTimeString());
    }
</script>

</body>
</html>
